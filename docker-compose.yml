version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: edpicker-crawler-app
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - '9000:9000'
      - '9001:9001'

  api:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run api:dev"
    volumes:
      - ./:/app
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://dev:dev@postgres:5432/edpicker-crawler-app
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CRAWLER_QUEUE_NAME: schoollens:crawl
      SCORING_QUEUE_NAME: schoollens:score
      INTERNAL_API_KEY: change-me
      STORAGE_PROVIDER: s3
      STORAGE_BUCKET: schoollens-assets
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis
      - minio

  crawler:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm --workspace apps/crawler run dev"
    volumes:
      - ./:/app
    environment:
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CRAWLER_QUEUE_NAME: schoollens:crawl
      SCORING_QUEUE_NAME: schoollens:score
      CRAWLER_API_BASE_URL: http://api:3000
      INTERNAL_API_KEY: change-me
    depends_on:
      - api
      - redis

volumes:
  pgdata:
